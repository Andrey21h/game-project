<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин ігор PS5</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Навігація -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                PS5 GameShop
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <!-- Пошук -->
                <form class="d-flex mx-auto search-form mb-2 mb-md-0">
                    <div class="input-group">
                        <input type="text" class="form-control" id="searchInput" placeholder="Пошук ігор PS5...">

                        <button class="btn btn-outline-light" type="button" id="searchBtn">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>

                <!-- Кошик -->
                <a href="cart.html" class="btn btn-outline-light rounded-pill">
                    <i class="bi bi-cart3"></i> Кошик
                </a>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero-section">
        <div class="container">
            <div class="row align-items-center min-vh-50">
                <div class="col-lg-6">
                    <h1 class="display-4 fw-bold text-white mb-4">
                        Найкращі <span class="text-primary">ігри PS5</span>
                    </h1>

                    <p class="lead text-white-50 mb-4">
                        Купуй топові ексклюзиви та популярні хіти для PlayStation 5 за вигідними цінами!
                    </p>

                    <a href="#products" class="btn btn-primary btn-lg">
                        <i class="bi bi-controller"></i> Перейти до ігор
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- Основний контент -->
    <main class="container my-5" id="products">

        <!-- Категорії -->
        <div class="row mb-4">
            <div class="col-12">

                <h2 class="section-title mb-4">
                    Популярні ігри PS5
                </h2>

                <div class="d-flex flex-wrap gap-2 mb-4" id="categoryFilters">

                    <button class="btn btn-dark category-btn active" data-category="all">
                        <i class="bi bi-grid"></i> Всі ігри
                    </button>

                    <button class="btn btn-outline-dark category-btn" data-category="Action">
                        Екшен
                    </button>

                    <button class="btn btn-outline-dark category-btn" data-category="Sports">
                        Спорт
                    </button>

                    <button class="btn btn-outline-dark category-btn" data-category="Racing">
                        Гонки
                    </button>

                    <button class="btn btn-outline-dark category-btn" data-category="Adventure">
                        Пригоди
                    </button>

                </div>
            </div>
        </div>

        <!-- Сітка товарів -->
        <div class="row gap-3" id="productsGrid">
            <!-- Картки ігор додаються через JS -->
        </div>

        <!-- Якщо нічого не знайдено -->
        <div class="text-center py-5 d-none" id="noProducts">

            <i class="bi bi-controller display-1 text-muted"></i>

            <h3 class="mt-3 text-muted">
                Ігор не знайдено
            </h3>

            <p class="text-muted">
                Спробуйте змінити пошук або категорію
            </p>

        </div>
    </main>

    <!-- Футер -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container">

            <hr class="border-secondary">

            <div class="text-center text-white-50">
                <p class="mb-0">
                    &copy; 2026 PS5 GameShop. Всі права захищені.
                </p>
            </div>

        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <!-- Custom JS -->
    <script src="script.js"></script>

</body>
</html>\
